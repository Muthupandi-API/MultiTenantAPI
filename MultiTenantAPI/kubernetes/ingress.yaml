apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: multitenant-ingress

spec:
  ingressClassName: nginx
  rules:
    - host: "*.jailscorp.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claudeapidemo-service
                port:
                  number: 80